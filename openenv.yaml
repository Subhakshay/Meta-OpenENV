name: gauntlet-shifting-sands
version: "2.0.0"
description: >
  Adversarial self-play customer support environment with policy drift.
  An Attacker agent generates deceptive tickets; a Defender agent must
  classify them correctly under evolving company policies.
  Combines The Gauntlet (adversarial self-play) with Shifting Sands
  (policy drift mid-session).
author: OpenEnv Community
license: MIT
themes:
  - self-improvement
  - world-modeling
tags:
  - openenv
  - adversarial
  - policy-drift
  - self-play
  - customer-support
  - rl-environment

tasks:
  - id: 1
    name: priority-only
    description: Classify ticket priority (Low/Medium/High/Critical). Easy mode — no deception, no drift.
    max_steps: 12
    difficulty: easy
  - id: 2
    name: full-classification
    description: Classify priority, category, draft response, handle escalation. Drift enabled.
    max_steps: 12
    difficulty: medium
  - id: 3
    name: multi-turn
    description: Full classification with clarification requests and policy drift. Multi-turn dialogue.
    max_steps: 12
    difficulty: hard

observation_space:
  type: dict
  fields:
    - ticket_id
    - subject
    - body
    - customer_tier
    - active_policy_version
    - world_state_summary
    - system_notice        # only present when drift fires
    - conversation_history # only present in multi-turn mode
    - sentiment_score      # only present after v3 schema drift
    - account_age_days     # only present after v3 schema drift

action_space:
  type: dict
  fields:
    - assign_priority      # Low | Medium | High | Critical
    - assign_category      # Billing | Technical | Shipping | Security
    - draft_response       # natural language response to customer
    - escalate             # boolean
    - ask_clarification    # boolean (Task 3 only)
    - clarification_text   # string (Task 3 only)
    - approve_refund       # boolean (Billing tickets only)

reward_range: [-10.0, 10.0]
episode_length: 12
reset_endpoint: /reset
step_endpoint: /step

api:
  reset: "POST /reset"
  step: "POST /step"
  episodes: "GET /episodes"
  episode_detail: "GET /episodes/{episode_id}"
  world_state: "GET /world_state/{session_id}"
  health: "GET /health"

huggingface:
  space: "Subhakshay/support-triage-env"
  sdk: docker
  port: 7860

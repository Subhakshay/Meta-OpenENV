name: customer-support-triage
version: "1.0.0"
description: >
  A real-world customer support triage environment where an AI agent learns
  to classify ticket priority, categorize issue type, and generate helpful
  responses. Simulates a genuine enterprise support workflow with three tasks
  of increasing difficulty.
author: OpenEnv Community
license: MIT
tags:
  - openenv
  - nlp
  - classification
  - generation
  - customer-support
  - real-world

observation_space:
  type: structured
  fields:
    ticket:
      type: object
      fields:
        id:            string
        subject:       string
        body:          string
        customer_tier: "free | pro | enterprise"
        created_at:    datetime
        sentiment:     "angry | neutral | positive"
    queue_size:            integer
    time_elapsed_seconds:  float
    agent_actions_taken:   integer
    task_id:               string
    hint:                  "string | null"

action_space:
  type: structured
  fields:
    assign_priority: "low | medium | high | critical"
    assign_category: "billing | technical | account | shipping | general | refund"
    response_text:   string
    escalate:        boolean

reward:
  range: [0.0, 1.0]
  type: dense
  description: >
    Weighted combination of priority accuracy (partial credit for near-miss),
    category accuracy (partial credit for related categories), and response
    quality (multi-factor: greeting, subject reference, domain vocabulary,
    action commitment, escalation, professional closing).

tasks:
  - id: task_1_priority
    difficulty: easy
    description: "Assign the correct priority level to each support ticket."
    max_steps: 10
    score_range: [0.0, 1.0]
    grader: grade_priority
    weights:
      priority: 1.0

  - id: task_2_classification
    difficulty: medium
    description: "Assign correct priority AND category to each support ticket."
    max_steps: 10
    score_range: [0.0, 1.0]
    grader: "grade_priority + grade_category"
    weights:
      priority: 0.6
      category: 0.4

  - id: task_3_full_triage
    difficulty: hard
    description: "Full triage: correct priority, category, quality response, and escalation."
    max_steps: 10
    score_range: [0.0, 1.0]
    grader: "grade_priority + grade_category + grade_response"
    weights:
      priority: 0.35
      category: 0.25
      response: 0.40

api:
  reset: "POST /reset"
  step:  "POST /step"
  state: "GET /state/{session_id}"
  tasks: "GET /tasks"
  action_space:      "GET /action_space"
  observation_space: "GET /observation_space"
  health:            "GET /health"

baseline_scores:
  rule_based:
    task_1_priority:       0.70
    task_2_classification: 0.60
    task_3_full_triage:    0.55
  gpt_4o_mini:
    task_1_priority:       0.88
    task_2_classification: 0.79
    task_3_full_triage:    0.73

huggingface:
  space: "your-username/customer-support-env"
  sdk:   docker
  port:  7860
